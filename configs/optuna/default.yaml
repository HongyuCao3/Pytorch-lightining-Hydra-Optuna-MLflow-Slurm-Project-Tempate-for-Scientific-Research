n_trials: 10

# metric / direction default to cfg.experiment.monitor / mode — the same
# scalar used by ModelCheckpoint, EarlyStopping and run_summary. Override
# here ONLY if the Optuna search should optimise a different scalar than
# the experiment's primary metric (rare — usually a mistake).
metric: null
direction: null

study_name: optuna_study
storage: null   # e.g. "sqlite:///optuna.db" for RDB persistence
timeout: null   # seconds; null = no timeout

# Hyperparameter search spaces (used by run_optuna objective)
search_space:
  method.learning_rate:
    type: float
    low: 1.0e-5
    high: 1.0e-2
    log: true
  method.weight_decay:
    type: float
    low: 1.0e-6
    high: 1.0e-3
    log: true
